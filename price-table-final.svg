<svg viewBox="0 0 1400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .table-bg { fill: #1a1a1a; }
      .header-bg { fill: #2d2d2d; }
      .row-alt-bg { fill: #242424; }
      .border { stroke: #404040; stroke-width: 1; }
      .header-text { fill: #ffffff; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .cell-text { fill: #e0e0e0; font-family: Arial, sans-serif; font-size: 15px; text-anchor: center; }
      .label-text { fill: #b0b0b0; font-family: Arial, sans-serif; font-size: 14px; font-weight: 500; text-anchor: start; }
    </style>
  </defs>

  <!-- Main background -->
  <rect class="table-bg" x="0" y="0" width="1400" height="560"/>

  <!-- Table structure: 7 rows (header + 6 duration rows) × 6 columns -->
  <!-- Column widths: Duration=200, Device1-5=240 each -->
  
  <!-- Row 1: Header -->
  <rect class="header-bg" x="0" y="0" width="200" height="60"/>
  <rect class="header-bg" x="200" y="0" width="240" height="60"/>
  <rect class="header-bg" x="440" y="0" width="240" height="60"/>
  <rect class="header-bg" x="680" y="0" width="240" height="60"/>
  <rect class="header-bg" x="920" y="0" width="240" height="60"/>
  <rect class="header-bg" x="1160" y="0" width="240" height="60"/>
  
  <!-- Header borders -->
  <line class="border" x1="0" y1="60" x2="1400" y2="60"/>
  <line class="border" x1="200" y1="0" x2="200" y2="560"/>
  <line class="border" x1="440" y1="0" x2="440" y2="560"/>
  <line class="border" x1="680" y1="0" x2="680" y2="560"/>
  <line class="border" x1="920" y1="0" x2="920" y2="560"/>
  <line class="border" x1="1160" y1="0" x2="1160" y2="560"/>
  
  <!-- Header text -->
  <text class="header-text" x="100" y="38">Duration</text>
  <text class="header-text" x="320" y="38">1 Device</text>
  <text class="header-text" x="560" y="38">2 Devices</text>
  <text class="header-text" x="800" y="38">3 Devices</text>
  <text class="header-text" x="1040" y="38">4 Devices</text>
  <text class="header-text" x="1280" y="38">5 Devices</text>

  <!-- Row 2: 1 Month -->
  <rect class="row-alt-bg" x="0" y="60" width="200" height="70"/>
  <rect x="0" y="60" width="200" height="70" fill="none" class="border"/>
  <rect x="200" y="60" width="240" height="70" fill="none" class="border"/>
  <rect x="440" y="60" width="240" height="70" fill="none" class="border"/>
  <rect x="680" y="60" width="240" height="70" fill="none" class="border"/>
  <rect x="920" y="60" width="240" height="70" fill="none" class="border"/>
  <rect x="1160" y="60" width="240" height="70" fill="none" class="border"/>
  
  <text class="label-text" x="15" y="105">1 Month</text>
  <text class="cell-text" x="320" y="105">4,000 Ks</text>
  <text class="cell-text" x="560" y="105">7,000 Ks</text>
  <text class="cell-text" x="800" y="105">10,000 Ks</text>
  <text class="cell-text" x="1040" y="105">13,000 Ks</text>
  <text class="cell-text" x="1280" y="105">16,000 Ks</text>

  <!-- Row 3: 3 Months -->
  <rect class="row-alt-bg" x="0" y="130" width="200" height="70"/>
  <rect x="0" y="130" width="200" height="70" fill="none" class="border"/>
  <rect x="200" y="130" width="240" height="70" fill="none" class="border"/>
  <rect x="440" y="130" width="240" height="70" fill="none" class="border"/>
  <rect x="680" y="130" width="240" height="70" fill="none" class="border"/>
  <rect x="920" y="130" width="240" height="70" fill="none" class="border"/>
  <rect x="1160" y="130" width="240" height="70" fill="none" class="border"/>
  
  <text class="label-text" x="15" y="175">3 Months</text>
  <text class="cell-text" x="320" y="175">12,000 Ks</text>
  <text class="cell-text" x="560" y="175">21,000 Ks</text>
  <text class="cell-text" x="800" y="175">30,000 Ks</text>
  <text class="cell-text" x="1040" y="175">39,000 Ks</text>
  <text class="cell-text" x="1280" y="175">48,000 Ks</text>

  <!-- Row 4: 5 Months -->
  <rect class="row-alt-bg" x="0" y="200" width="200" height="70"/>
  <rect x="0" y="200" width="200" height="70" fill="none" class="border"/>
  <rect x="200" y="200" width="240" height="70" fill="none" class="border"/>
  <rect x="440" y="200" width="240" height="70" fill="none" class="border"/>
  <rect x="680" y="200" width="240" height="70" fill="none" class="border"/>
  <rect x="920" y="200" width="240" height="70" fill="none" class="border"/>
  <rect x="1160" y="200" width="240" height="70" fill="none" class="border"/>
  
  <text class="label-text" x="15" y="245">5 Months</text>
  <text class="cell-text" x="320" y="245">20,000 Ks</text>
  <text class="cell-text" x="560" y="245">35,000 Ks</text>
  <text class="cell-text" x="800" y="245">50,000 Ks</text>
  <text class="cell-text" x="1040" y="245">65,000 Ks</text>
  <text class="cell-text" x="1280" y="245">80,000 Ks</text>

  <!-- Row 5: 7 Months -->
  <rect class="row-alt-bg" x="0" y="270" width="200" height="70"/>
  <rect x="0" y="270" width="200" height="70" fill="none" class="border"/>
  <rect x="200" y="270" width="240" height="70" fill="none" class="border"/>
  <rect x="440" y="270" width="240" height="70" fill="none" class="border"/>
  <rect x="680" y="270" width="240" height="70" fill="none" class="border"/>
  <rect x="920" y="270" width="240" height="70" fill="none" class="border"/>
  <rect x="1160" y="270" width="240" height="70" fill="none" class="border"/>
  
  <text class="label-text" x="15" y="315">7 Months</text>
  <text class="cell-text" x="320" y="315">28,000 Ks</text>
  <text class="cell-text" x="560" y="315">49,000 Ks</text>
  <text class="cell-text" x="800" y="315">70,000 Ks</text>
  <text class="cell-text" x="1040" y="315">91,000 Ks</text>
  <text class="cell-text" x="1280" y="315">112,000 Ks</text>

  <!-- Row 6: 9 Months -->
  <rect class="row-alt-bg" x="0" y="340" width="200" height="70"/>
  <rect x="0" y="340" width="200" height="70" fill="none" class="border"/>
  <rect x="200" y="340" width="240" height="70" fill="none" class="border"/>
  <rect x="440" y="340" width="240" height="70" fill="none" class="border"/>
  <rect x="680" y="340" width="240" height="70" fill="none" class="border"/>
  <rect x="920" y="340" width="240" height="70" fill="none" class="border"/>
  <rect x="1160" y="340" width="240" height="70" fill="none" class="border"/>
  
  <text class="label-text" x="15" y="385">9 Months</text>
  <text class="cell-text" x="320" y="385">36,000 Ks</text>
  <text class="cell-text" x="560" y="385">63,000 Ks</text>
  <text class="cell-text" x="800" y="385">90,000 Ks</text>
  <text class="cell-text" x="1040" y="385">117,000 Ks</text>
  <text class="cell-text" x="1280" y="385">144,000 Ks</text>

  <!-- Row 7: 12 Months -->
  <rect class="row-alt-bg" x="0" y="410" width="200" height="70"/>
  <rect x="0" y="410" width="200" height="70" fill="none" class="border"/>
  <rect x="200" y="410" width="240" height="70" fill="none" class="border"/>
  <rect x="440" y="410" width="240" height="70" fill="none" class="border"/>
  <rect x="680" y="410" width="240" height="70" fill="none" class="border"/>
  <rect x="920" y="410" width="240" height="70" fill="none" class="border"/>
  <rect x="1160" y="410" width="240" height="70" fill="none" class="border"/>
  
  <text class="label-text" x="15" y="455">12 Months</text>
  <text class="cell-text" x="320" y="455">48,000 Ks</text>
  <text class="cell-text" x="560" y="455">84,000 Ks</text>
  <text class="cell-text" x="800" y="455">120,000 Ks</text>
  <text class="cell-text" x="1040" y="455">156,000 Ks</text>
  <text class="cell-text" x="1280" y="455">192,000 Ks</text>

  <!-- Outer border -->
  <rect class="border" x="0" y="0" width="1400" height="560" fill="none" stroke-width="2"/>
</svg>